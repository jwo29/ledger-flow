spring:
  application:
    name: ledger-flow
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ledger_flow
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
    host: localhost
    port: 5672
    stream:
      username: guest
      password: guest
